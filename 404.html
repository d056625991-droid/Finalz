<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <!--
      GitHub Pages SPA redirect trick (https://github.com/rafgraph/spa-github-pages).

      This site is a single static index.html. A client activation link
      (e.g. https://<you>.github.io/Hgfdd/vvdtgeescvgddhggdgrhr) has no
      matching file, so GitHub Pages serves this 404 page instead of the
      app. This script repackages the real path into a query string and
      redirects to index.html, which unpacks it back into the address bar
      (see the small decode script at the top of index.html's <head>) so
      the app can read the activation slug and continue normally.

      pathSegmentsToKeep = 1 preserves the repo name segment (e.g. /Hgfdd)
      for GitHub project pages. If this is ever moved to a custom domain
      or a user/organization root site (username.github.io), change this
      to 0.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
